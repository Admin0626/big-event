server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/experiment_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456 # 替换为你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 驼峰自动映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印SQL日志（实验调试用）
  global-config:
    db-config:
      id-type: auto

# 自定义JWT配置
jwt:
  secret-key: BigEventLab2026SecretKey1234567890 # 至少32位，生产环境建议放环境变量
  expiration: 7200000 # 2小时(毫秒)